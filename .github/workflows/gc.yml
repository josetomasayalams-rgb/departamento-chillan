name: Garbage Collection

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: gc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - name: Run read-only GC
        id: gc
        continue-on-error: true
        run: make gc > gc-report.txt 2>&1
      - name: Print GC report
        if: always()
        run: node -e "const fs=require('node:fs'); process.stdout.write(fs.readFileSync('gc-report.txt', 'utf8'))"
      - name: Create an issue when findings exist
        if: steps.gc.outcome == 'failure'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('node:fs');
            const date = new Date().toISOString().slice(0, 10);
            const title = `Reservas familiares GC findings — ${date}`;
            const report = fs.readFileSync('gc-report.txt', 'utf8').replaceAll('```', '` ` `').slice(0, 60000);
            const { data: existing } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              per_page: 100,
            });
            if (existing.some((issue) => issue.title === title)) return;
            await github.rest.issues.create({
              ...context.repo,
              title,
              body: `The weekly read-only scan found repository entropy. No files were changed.\n\n\`\`\`text\n${report}\n\`\`\``,
            });
